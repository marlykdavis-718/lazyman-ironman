<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <title>LazyMan Ironman</title>
</head>

<body class="bg-slate-100 text-slate-900">

<div class="max-w-6xl mx-auto p-4 space-y-6">

  <!-- HERO -->
  <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-6 rounded-2xl shadow-lg">
    <h1 class="text-3xl font-bold">🏆 LazyMan Ironman</h1>
    <p class="opacity-90">Real-time endurance challenge</p>

    <div class="mt-4">
      <p class="text-sm opacity-80">Current Leader</p>
      <p id="leaderName" class="text-2xl font-bold">—</p>
      <p id="leaderPct" class="text-sm opacity-90">—</p>
    </div>
  </div>

  <!-- TOP 3 PODIUM -->
  <div id="podium" class="grid md:grid-cols-3 gap-4"></div>

  <!-- GROUP JOURNEY -->
  <div class="bg-white p-4 rounded-2xl shadow">
    <h2 class="font-semibold mb-2">🌍 Group Journey</h2>
    <div class="w-full bg-slate-200 rounded-full h-3">
      <div id="worldBar" class="bg-indigo-500 h-3 rounded-full transition-all duration-500" style="width:0%"></div>
    </div>
    <p class="text-xs text-slate-500 mt-2">
      Collective miles across swim, bike, run
    </p>
  </div>

  <!-- DISCIPLINES -->
  <div class="grid md:grid-cols-3 gap-4">

    <div class="bg-white p-4 rounded-2xl shadow">
      <h3 class="font-bold text-sky-600">🏊 Swim</h3>
      <p id="swimText" class="text-sm text-slate-600 mt-1"></p>
      <div class="w-full bg-slate-200 h-2 rounded mt-2">
        <div id="swimBar" class="bg-sky-500 h-2 rounded transition-all duration-500"></div>
      </div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <h3 class="font-bold text-emerald-600">🚴 Bike</h3>
      <p id="bikeText" class="text-sm text-slate-600 mt-1"></p>
      <div class="w-full bg-slate-200 h-2 rounded mt-2">
        <div id="bikeBar" class="bg-emerald-500 h-2 rounded transition-all duration-500"></div>
      </div>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow">
      <h3 class="font-bold text-orange-600">🏃 Run</h3>
      <p id="runText" class="text-sm text-slate-600 mt-1"></p>
      <div class="w-full bg-slate-200 h-2 rounded mt-2">
        <div id="runBar" class="bg-orange-500 h-2 rounded transition-all duration-500"></div>
      </div>
    </div>

  </div>

  <!-- LOG -->
  <div class="bg-white p-4 rounded-2xl shadow">
    <h2 class="font-bold mb-3">➕ Log Activity</h2>

    <div class="grid md:grid-cols-4 gap-2">
      <select id="member" class="p-2 border rounded-lg">
        <option>Sarah</option>
        <option>Mike</option>
        <option>You</option>
      </select>

      <select id="type" class="p-2 border rounded-lg">
        <option value="swim">Swim</option>
        <option value="bike">Bike</option>
        <option value="run">Run</option>
      </select>

      <input id="distance" type="number" placeholder="Miles" class="p-2 border rounded-lg"/>

      <button onclick="addActivity()" class="bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg p-2">
        Add
      </button>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div id="leaderboard" class="grid md:grid-cols-3 gap-4"></div>

  <!-- FEED -->
  <div class="bg-white p-4 rounded-2xl shadow">
    <h2 class="font-bold mb-2">📍 Live Activity Feed</h2>
    <div id="feed" class="space-y-2 text-sm text-slate-700"></div>
  </div>

</div>

<script>

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {
  apiKey: "AIzaSyA10ckmEikayA_RYHXGYlux46Vs_Vnnc2s",
  authDomain: "lazy-ironman.firebaseapp.com",
  projectId: "lazy-ironman",
  storageBucket: "lazy-ironman.firebasestorage.app",
  messagingSenderId: "771658035326",
  appId: "1:771658035326:web:9b5d7e67a60e2c536fa82f"
};
  
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =========================
   GOALS
========================= */

const GOALS = {
  swim: 2.4,
  bike: 112,
  run: 26.2
};

/* =========================
   STATE
========================= */

let data = {};
let feed = [];

/* =========================
   REALTIME LISTENER
========================= */

db.collection("ironman").doc("group").onSnapshot(doc => {
  if (!doc.exists) return;

  const d = doc.data();
  data = d.members || {};
  feed = d.feed || [];

  render();
});

/* =========================
   SAVE TO FIREBASE
========================= */

function save() {
  db.collection("ironman").doc("group").set({
    members: data,
    feed: feed
  });
}

/* =========================
   ADD ACTIVITY
========================= */

function addActivity() {
  const m = document.getElementById("member").value;
  const t = document.getElementById("type").value;
  const d = parseFloat(document.getElementById("distance").value);

  if (!d) return;

  if (!data[m]) {
    data[m] = { swim: 0, bike: 0, run: 0 };
  }

  data[m][t] += d;
  feed.push(`${m} +${d} ${t}`);

  save();
}

/* =========================
   CALC %
========================= */

function percent(p) {
  let s = (p.swim / GOALS.swim) * 100 || 0;
  let b = (p.bike / GOALS.bike) * 100 || 0;
  let r = (p.run / GOALS.run) * 100 || 0;
  return (s + b + r) / 3;
}

/* =========================
   RENDER
========================= */

function render() {

  const names = Object.keys(data);
  if (!names.length) return;

  const sorted = names.sort((a,b)=>percent(data[b]) - percent(data[a]));

  /* HERO */
  document.getElementById("leaderName").innerText = sorted[0];
  document.getElementById("leaderPct").innerText =
    percent(data[sorted[0]]).toFixed(1) + "% complete";

  /* PODIUM */
  const podium = document.getElementById("podium");

  podium.innerHTML = sorted.slice(0,3).map((n,i)=>`
    <div class="bg-white p-4 rounded-2xl shadow text-center border-t-4
      ${i===0?'border-yellow-400':i===1?'border-gray-400':'border-orange-400'}">

      <p class="text-lg font-bold">${i===0?'🥇':i===1?'🥈':'🥉'} ${n}</p>
      <p class="text-indigo-600 font-bold">${percent(data[n]).toFixed(1)}%</p>
    </div>
  `).join("");

  /* GROUP TOTAL */
  let total = Object.values(data)
    .reduce((a,p)=>a+p.swim+p.bike+p.run,0);

  document.getElementById("worldBar").style.width =
    Math.min(total / 500 * 100, 100) + "%";

  /* DISCIPLINES (You view simplified) */
  let me = data["You"] || { swim:0, bike:0, run:0 };

  document.getElementById("swimBar").style.width = (me.swim/GOALS.swim*100)+"%";
  document.getElementById("bikeBar").style.width = (me.bike/GOALS.bike*100)+"%";
  document.getElementById("runBar").style.width = (me.run/GOALS.run*100)+"%";

  document.getElementById("swimText").innerText =
    `${me.swim.toFixed(1)} / 2.4 mi`;

  document.getElementById("bikeText").innerText =
    `${me.bike.toFixed(1)} / 112 mi`;

  document.getElementById("runText").innerText =
    `${me.run.toFixed(1)} / 26.2 mi`;

  /* FEED */
  document.getElementById("feed").innerHTML =
    feed.slice().reverse().map(f=>`<div>• ${f}</div>`).join("");

  /* LEADERBOARD (full) */
  document.getElementById("leaderboard").innerHTML = sorted.map(n=>`
    <div class="bg-white p-4 rounded-2xl shadow">
      <p class="font-bold">${n}</p>
      <p class="text-indigo-600 font-bold">${percent(data[n]).toFixed(1)}%</p>
    </div>
  `).join("");
}

</script>

</body>
</html>
