<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>LazyMan Ironman</title>
</head>

<body class="bg-gray-100 text-gray-900">

<div class="max-w-6xl mx-auto p-4">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-3xl font-bold">🏆 LazyMan Ironman</h1>
      <p class="text-gray-500">Group Challenge Dashboard</p>
    </div>
    <div class="text-right">
      <p class="text-sm text-gray-500">Group Progress</p>
      <p id="groupMiles" class="font-bold text-lg">0 miles</p>
    </div>
  </div>

  <!-- GROUP GOAL -->
  <div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-2">🌍 Group Journey</h2>
    <div class="w-full bg-gray-200 rounded-full h-4">
      <div id="worldBar" class="bg-indigo-500 h-4 rounded-full" style="width:0%"></div>
    </div>
    <p class="text-sm mt-2 text-gray-500">San Diego → "Ironman World Tour"</p>
  </div>

  <!-- LEADERBOARD -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="leaderboard"></div>

  <!-- LOG ACTIVITY -->
  <div class="bg-white p-4 rounded-xl shadow mb-6">
    <h2 class="font-bold mb-4">➕ Log Activity</h2>

    <div class="grid md:grid-cols-4 gap-2">
      <select id="member" class="p-2 border rounded">
        <option>Sarah</option>
        <option>Mike</option>
        <option>You</option>
      </select>

      <select id="type" class="p-2 border rounded">
        <option value="swim">Swim</option>
        <option value="bike">Bike</option>
        <option value="run">Run</option>
      </select>

      <input id="distance" type="number" placeholder="Miles" class="p-2 border rounded"/>

      <button onclick="addActivity()" class="bg-indigo-600 text-white rounded p-2">
        Add
      </button>
    </div>
  </div>

  <!-- ACTIVITY FEED -->
  <div class="bg-white p-4 rounded-xl shadow">
    <h2 class="font-bold mb-4">📍 Recent Activity</h2>
    <div id="feed" class="space-y-2"></div>
  </div>

</div>

<script>
const GOALS = {
  swim: 2.4,
  bike: 112,
  run: 26.2
};

let data = JSON.parse(localStorage.getItem("ironman")) || {
  Sarah: { swim: 0, bike: 0, run: 0 },
  Mike: { swim: 0, bike: 0, run: 0 },
  You: { swim: 0, bike: 0, run: 0 }
};

let feed = JSON.parse(localStorage.getItem("feed")) || [];

function save() {
  localStorage.setItem("ironman", JSON.stringify(data));
  localStorage.setItem("feed", JSON.stringify(feed));
}

function calcPercent(person) {
  let s = (data[person].swim / GOALS.swim) * 100;
  let b = (data[person].bike / GOALS.bike) * 100;
  let r = (data[person].run / GOALS.run) * 100;
  return ((s + b + r) / 3).toFixed(1);
}

function render() {
  renderLeaderboard();
  renderFeed();
  renderGroup();
}

function renderLeaderboard() {
  const el = document.getElementById("leaderboard");
  el.innerHTML = "";

  let sorted = Object.keys(data).sort((a,b)=>{
    return calcPercent(b) - calcPercent(a);
  });

  sorted.forEach(name=>{
    let pct = calcPercent(name);

    el.innerHTML += `
      <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-bold text-lg">${name}</h3>
        <p class="text-indigo-600 font-bold">${pct}%</p>

        <div class="text-sm mt-2">
          🏊 ${data[name].swim.toFixed(1)} / ${GOALS.swim}<br/>
          🚴 ${data[name].bike.toFixed(1)} / ${GOALS.bike}<br/>
          🏃 ${data[name].run.toFixed(1)} / ${GOALS.run}
        </div>
      </div>
    `;
  });
}

function renderFeed() {
  const el = document.getElementById("feed");
  el.innerHTML = feed.slice().reverse().map(f=>{
    return `<div class="text-sm border-b pb-1">${f}</div>`;
  }).join("");
}

function renderGroup() {
  let total =
    Object.values(data).reduce((sum,p)=>
      sum + p.swim + p.bike + p.run
    ,0);

  document.getElementById("groupMiles").innerText =
    total.toFixed(1) + " miles";

  let worldPct = Math.min(total / 500 * 100, 100);
  document.getElementById("worldBar").style.width = worldPct + "%";
}

function addActivity() {
  const name = document.getElementById("member").value;
  const type = document.getElementById("type").value;
  const dist = parseFloat(document.getElementById("distance").value);

  if (!dist) return;

  data[name][type] += dist;

  feed.push(`${name} +${dist} ${type}`);
  if (feed.length > 20) feed.shift();

  save();
  render();
}

render();
</script>

</body>
</html>
