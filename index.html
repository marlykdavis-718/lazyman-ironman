<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LazyMan Ironman V5 Starter</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100">
<div class="max-w-6xl mx-auto p-6 space-y-6">
<div class="rounded-2xl p-6 text-white bg-gradient-to-r from-indigo-600 to-purple-600">
<h1 class="text-3xl font-bold">🏆 LazyMan Ironman V5</h1>
<p>Starter architecture for the full rebuild.</p>
</div>

<div id="podium" class="grid md:grid-cols-3 gap-4"></div>

<div class="bg-white rounded-2xl shadow p-4">
<h2 class="font-bold mb-3">Athletes</h2>
<div id="athleteGrid" class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
</div>

<div class="bg-white rounded-2xl shadow p-4">
<h2 class="font-bold mb-3">Log Activity</h2>
<div class="grid md:grid-cols-4 gap-2">
<select id="member" class="border rounded p-2"></select>
<select id="type" class="border rounded p-2">
<option value="swim">Swim (meters)</option>
<option value="bike">Bike (miles)</option>
<option value="run">Run (miles)</option>
</select>
<input id="distance" class="border rounded p-2" type="number" placeholder="Distance">
<button id="addBtn" class="bg-indigo-600 text-white rounded p-2">Add</button>
</div>
</div>

<div class="bg-white rounded-2xl shadow p-4">
<h2 class="font-bold">Activity Feed</h2>
<div id="feed" class="space-y-2 mt-2"></div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyA10ckmEikayA_RYHXGYlux46Vs_Vnnc2s",
authDomain:"lazy-ironman.firebaseapp.com",
projectId:"lazy-ironman",
storageBucket:"lazy-ironman.firebasestorage.app",
messagingSenderId:"771658035326",
appId:"1:771658035326:web:9b5d7e67a60e2c536fa82f"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const GOALS={swim:3860,bike:112,run:26.2};
const PARTICIPANTS=["Marly","Laura","Nick","Katie","Gunnar","Taylor","Dwayne"];
let state={members:{},feed:[]};

PARTICIPANTS.forEach(n=>{
 document.getElementById("member").innerHTML += `<option>${n}</option>`;
});

function ensure(n){
 if(!state.members[n]) state.members[n]={swim:0,bike:0,run:0};
}

db.collection("ironman").doc("group").onSnapshot(doc=>{
 if(doc.exists){
   state=doc.data();
 }
 PARTICIPANTS.forEach(ensure);
 render();
});

function pct(p){
 return ((p.swim/GOALS.swim)+(p.bike/GOALS.bike)+(p.run/GOALS.run))/3*100;
}

function render(){
 const sorted=[...PARTICIPANTS].sort((a,b)=>pct(state.members[b])-pct(state.members[a]));
 document.getElementById("podium").innerHTML=sorted.slice(0,3).map((n,i)=>`
<div class="bg-white rounded-2xl shadow p-4 text-center">
<div class="text-3xl">${["🥇","🥈","🥉"][i]}</div>
<div class="font-bold">${n}</div>
<div class="text-indigo-600">${pct(state.members[n]).toFixed(1)}%</div>
</div>`).join("");

 document.getElementById("athleteGrid").innerHTML=PARTICIPANTS.map(n=>{
 let p=state.members[n];
 return `<div class="bg-slate-50 rounded-xl p-4 border">
 <div class="flex justify-between"><b>${n}</b><span>${pct(p).toFixed(1)}%</span></div>
 <div class="mt-2 text-sm">🏊 ${p.swim.toFixed(0)} / 3860 m</div>
 <div class="w-full h-2 bg-slate-200 rounded"><div class="h-2 bg-sky-500 rounded" style="width:${Math.min(p.swim/GOALS.swim*100,100)}%"></div></div>
 <div class="mt-2 text-sm">🚴 ${p.bike.toFixed(1)} /112 mi</div>
 <div class="w-full h-2 bg-slate-200 rounded"><div class="h-2 bg-emerald-500 rounded" style="width:${Math.min(p.bike/GOALS.bike*100,100)}%"></div></div>
 <div class="mt-2 text-sm">🏃 ${p.run.toFixed(1)} /26.2 mi</div>
 <div class="w-full h-2 bg-slate-200 rounded"><div class="h-2 bg-orange-500 rounded" style="width:${Math.min(p.run/GOALS.run*100,100)}%"></div></div>
 </div>`;
 }).join("");

 document.getElementById("feed").innerHTML=(state.feed||[]).slice().reverse().map(f=>`<div class="border-b py-1">${f}</div>`).join("");
}

document.getElementById("type").addEventListener("change",e=>{
 document.getElementById("distance").placeholder=e.target.value==="swim"?"Meters":"Miles";
});

document.getElementById("addBtn").onclick=async()=>{
 const m=member.value,t=type.value,d=parseFloat(distance.value);
 if(!d)return;
 ensure(m);
 state.members[m][t]+=d;
 state.feed=state.feed||[];
 state.feed.push(`${new Date().toLocaleString()} — ${m} logged ${d} ${t==="swim"?"m":"mi"} ${t}`);
 await db.collection("ironman").doc("group").set(state);
 distance.value="";
};
</script>
</body>
</html>
